name: Self-Hosted CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # This ensures the runner starts with a clean slate
          clean: true

      - name: Prepare Lowercase Owner Name
        run: |
          echo "OWNER_LC=${OWNER,,}" >> ${GITHUB_ENV}
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.WEEK3T}}

      # Check if folders exist to prevent the "path not found" error
      - name: Verify Directory Structure
        run: |
          echo "Current directory: $(pwd)"
          ls -R

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          # Double-check: Is your folder "backend" or "Backend"? 
          # Linux (self-hosted) is case-sensitive.
          context: ./backend 
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/week3:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend 
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/week3/templates:latest
