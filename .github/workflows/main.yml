name: Self-Hosted CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Diagnostic step: This will show you exactly what folders exist
      - name: List files in repository
        run: ls -R

      - name: Prepare Lowercase Owner Name
        id: prep
        run: |
          echo "OWNER_LC=${OWNER,,}" >> ${GITHUB_ENV}
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          # IMPORTANT: Ensure this matches your folder name exactly!
          context: ./backend 
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/week3:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          # IMPORTANT: Ensure this matches your folder name exactly!
          context: ./frontend 
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/week3/templates:latest
